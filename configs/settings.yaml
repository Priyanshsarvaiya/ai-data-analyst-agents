runtime:
  artifacts_dir: artifacts
  log_level: INFO
  max_rows_profile: 50000

llm:
  provider: openrouter
  model: openai/gpt-4o-mini
  temperature: 0.2
  max_tokens: 8192
  timeout_s: 60

qa:
  missingness_warn_threshold: 0.2
  duplicate_warn_threshold: 0.01
  outlier_z_threshold: 4.0

eda:
  max_unique_for_category: 30
  max_plots: 12