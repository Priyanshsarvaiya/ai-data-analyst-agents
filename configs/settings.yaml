runtime:
  artifacts_dir: artifacts
  log_level: INFO
  max_rows_profile: 50000

llm:
  provider: openrouter
  model: openai/gpt-5-mini
  temperature: 0.2
  max_tokens: 8192
  timeout_s: 60

qa:
  missingness_warn_threshold: 0.2
  duplicate_warn_threshold: 0.01
  outlier_z_threshold: 4.0

eda:
  max_unique_for_category: 30
  max_plots: 12

sql:
  default_query_row_limit: 50000
  introspection_max_tables: 200
  preview_rows: 10000
  include_row_counts: true

security:
  enforce_read_only_sql: true
  allow_raw_rows_to_llm: false
  max_rows_to_llm: 25
  user_error_max_chars: 400

planning:
  next_steps_task_budget: 6
